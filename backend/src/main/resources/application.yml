spring:
  datasource:
    # Uses environment variables with sensible local defaults
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tool71}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      [cite_start]ddl-auto: validate # Important: Flyway handles the schema 
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}

# Custom JWT property for Security Developer
jwt:
  secret: ${JWT_SECRET:your_super_secret_development_key_change_in_production}
version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: tool71-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tool71
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  redis:
    image: redis:7-alpine
    container_name: tool71-redis
    ports:
      - "6379:6379"